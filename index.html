<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Clone</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <!-- App Container -->
    <div class="app-container">
        
        <!-- Video Container -->
        <div class="video-container">
            
            <!-- Individual Video Post -->
            <div class="video-post">
                <video class="tiktok-video" src="https://w3schools.com" loop playsinline></video>
                
                <!-- Sidebar Actions -->
                <div class="sidebar">
                    <div class="action-btn" onclick="toggleLike(this)">
                        <i class="fa-solid fa-heart"></i>
                        <p>12.5k</p>
                    </div>
                    <div class="action-btn" onclick="openComments()">
                        <i class="fa-solid fa-comment-dots"></i>
                        <p>1,234</p>
                    </div>
                    <div class="action-btn" onclick="shareVideo()">
                        <i class="fa-solid fa-share"></i>
                        <p>567</p>
                    </div>
                </div>

                <!-- Video Info -->
                <div class="video-info">
                    <div style="max-width: 56vh;"><div style="left: 0; width: 100%; height: 0; position: relative; padding-bottom: 178.2607%;"><iframe src="https://iframely.net/Oslgj1Eh?theme=dark" style="top: 0; left: 0; width: 100%; height: 100%; position: absolute; border: 0;" allowfullscreen scrolling="no" allow="autoplay *;"></iframe></div></div>
            </div>

            <!-- Individual Video Post 2 -->
            <div class="video-post">
                
                <!-- Sidebar Actions -->
                <div class="sidebar">
                    <div class="action-btn" onclick="toggleLike(this)">
                        <i class="fa-solid fa-heart"></i>
                        <p>45.2k</p>
                    </div>
                    <div class="action-btn" onclick="openComments()">
                        <i class="fa-solid fa-comment-dots"></i>
                        <p>2,891</p>
                    </div>
                    <div class="action-btn" onclick="shareVideo()">
                        <i class="fa-solid fa-share"></i>
                        <p>1.2k</p>
                    </div>
                </div>

                <!-- Video Info -->
                <div class="video-info">
                    <h3>@nature_lovers</h3>
                    <p>Beautiful ocean waves 🌊 #nature #ocean</p>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active"><i class="fa-solid fa-house"></i><span>Home</span></div>
            <div class="nav-item"><i class="fa-solid fa-compass"></i><span>Discover</span></div>
            <div class="nav-item add-icon"><i class="fa-solid fa-plus"></i></div>
            <div class="nav-item"><i class="fa-solid fa-message"></i><span>Inbox</span></div>
            <div class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
